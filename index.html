<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Apartment temperatures</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
    color: #1d1d1f;
    background:
      radial-gradient(1200px 600px at 15% -10%, #dfe9f5 0%, rgba(223,233,245,0) 60%),
      radial-gradient(1000px 500px at 110% 20%, #f0e8f7 0%, rgba(240,232,247,0) 55%),
      #f5f5f7;
  }
  .card {
    background: rgba(255,255,255,0.72);
    -webkit-backdrop-filter: blur(20px) saturate(180%); backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(0,0,0,0.06); border-radius: 20px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.05);
    padding: 36px 32px; width: min(360px, calc(100vw - 40px)); text-align: center;
  }
  h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  p { margin: 0 0 22px; color: rgba(60,60,67,0.6); font-size: 14px; }
  input {
    width: 100%; font: inherit; font-size: 16px; text-align: center;
    padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.9); outline: none;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }
  input:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.18); }
  button {
    width: 100%; margin-top: 12px; font: inherit; font-size: 15px; font-weight: 600;
    padding: 10px; border: 0; border-radius: 12px; background: #1d1d1f; color: #fff;
    cursor: pointer; transition: transform 120ms cubic-bezier(0.23,1,0.32,1), opacity 150ms ease;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; }
  .err { color: #d70015; font-size: 13px; margin-top: 12px; min-height: 18px; }
  @keyframes shake { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  .shake { animation: shake 180ms ease 2; }
  @media (prefers-reduced-motion: reduce) {
    .shake { animation: none; }
    button:active { transform: none; opacity: 0.7; }
  }
  @media (prefers-reduced-transparency: reduce) {
    .card { background: #fff; -webkit-backdrop-filter: none; backdrop-filter: none; }
  }
</style>
</head>

  </form>
  <div class="err" id="err"></div>
</div>

  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(SALT), iterations: ITERS, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, true, ["decrypt"]);
}
async function unlock(key) {
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(NONCE) }, key, b64(CT));
  const html = new TextDecoder().decode(pt);
  document.open(); document.write(html); document.close();
}
(async () => {
  // remembered key from a previous visit (salt is stable across republishes)
  try {
    const jwk = localStorage.getItem("aptdash-key");
    if (jwk) {
      const key = await crypto.subtle.importKey("jwk", JSON.parse(jwk), { name: "AES-GCM" }, true, ["decrypt"]);
      await unlock(key);
    }
  } catch (e) { localStorage.removeItem("aptdash-key"); }
})();
document.getElementById("f").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = document.getElementById("btn"), err = document.getElementById("err");
  btn.disabled = true; err.textContent = "";
  try {
    const key = await deriveKey(document.getElementById("pw").value);
    await unlock(key);
    try { localStorage.setItem("aptdash-key", JSON.stringify(await crypto.subtle.exportKey("jwk", key))); } catch (e) {}
  } catch (e) {
    err.textContent = "Wrong password";
    const card = document.getElementById("card");
    card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake");
    btn.disabled = false;
  }
});
